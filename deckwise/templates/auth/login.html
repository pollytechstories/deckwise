{% extends "base.html" %}
{% block title %}Login — DeckWise{% endblock %}

{% block content %}
<article style="max-width: 450px; margin: 0 auto;">
    <header>
        <h2>Login</h2>
    </header>
    <form method="post">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" value="{{ email|default('') }}" required autofocus>

        <label for="password">Password</label>
        <input type="password" id="password" name="password" required>

        <button type="submit">Login</button>
    </form>
    <p>Don't have an account? <a href="{{ url_for('auth.register') }}">Register</a></p>
</article>
{% endblock %}
